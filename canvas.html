<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloomette — Color Mood Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F4F3EF;
      --surface: #FFFFFF;
      --surface-soft: #FAFAF7;
      --border: #E5E3DD;
      --border-strong: #1A1A1A;
      --text: #1A1A1A;
      --text-muted: #8A8A85;
      --text-faint: #B8B7B1;
      --primary: #1A1A1A;
      --primary-hover: #000000;
      --primary-soft: rgba(26, 26, 26, 0.04);
      --radius-sm: 2px;
      --radius-md: 4px;
      --radius-lg: 6px;

      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .main-row {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      background: var(--surface);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .sidebar-left {
      width: 260px;
      border-right: 1px solid var(--border);
    }

    .sidebar-right {
      width: 300px;
      border-left: 1px solid var(--border);
    }

    .panel-header {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-bottom: 16px;
      margin: 0;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .brand-name {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 44px;
      letter-spacing: -0.5px;
      color: var(--text);
      margin: 0;
      line-height: 1;
    }

    .brand-tagline {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    .tool-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-group label,
    .section-title {
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    input[type="range"],
    input[type="number"] {
      width: 100%;
    }

    input[type="range"] {
      accent-color: var(--primary);
    }

    input[type="number"],
    input[type="file"] {
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 8px 2px;
      font-family: var(--font-mono);
      font-size: 12px;
      background: transparent;
      color: var(--text);
    }

    input[type="number"]:focus,
    input[type="file"]:focus {
      outline: none;
      border-bottom-color: var(--text);
    }

    .brush-size-value,
    .color-value,
    .lab-value {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      word-break: break-word;
      letter-spacing: 0.2px;
    }

    .histogram-label,
    .status-text,
    .match-count {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-word;
      font-style: italic;
      font-family: var(--font-serif);
    }

    .color-picker {
      width: 100%;
      height: 100px;
      border: 1px solid var(--border);
      background: none;
      padding: 0;
      cursor: pointer;
      border-radius: var(--radius-md);
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--primary);
      color: #FFFFFF;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .action-btn:hover {
      background: var(--primary-hover);
    }

    .action-btn:disabled {
      background: transparent;
      color: var(--text-faint);
      border-color: var(--border);
      cursor: not-allowed;
    }

    .action-btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
    }

    .action-btn.secondary:hover {
      background: var(--text);
      color: #FFFFFF;
    }

    .action-btn.secondary:disabled {
      background: transparent;
      color: var(--text-faint);
      border-color: var(--border);
    }

    .canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      background: var(--bg);
    }

    canvas {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: none;
      touch-action: none;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .mini-canvas {
      width: 100%;
      height: auto;
      max-width: 260px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: none;
    }

    .chart-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 0;
      border: 1px solid rgba(26, 26, 26, 0.12);
      flex-shrink: 0;
    }

    .matches-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .match-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px;
      background: var(--surface);
    }

    .match-card a {
      display: block;
      text-decoration: none;
      cursor: pointer;
    }

    .match-card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 0;
      display: block;
      background: #ECEAE5;
      transition: opacity 0.15s ease;
    }

    .match-card a:hover img {
      opacity: 0.85;
    }

    .match-score {
      font-family: var(--font-mono);
      font-size: 10px;
      margin-top: 6px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      word-break: break-word;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .drawer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: 60vh;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .drawer.closed {
      max-height: 52px;
    }

    .drawer-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: none;
      padding: 0 28px;
      height: 52px;
      min-height: 52px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      width: 100%;
    }

    .drawer:not(.closed) .drawer-toggle {
      border-bottom-color: var(--border);
    }

    .drawer-label-group {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .drawer-label {
      color: var(--text);
      transition: color 0.15s;
    }

    .drawer-toggle:hover .drawer-label {
      color: var(--text-muted);
    }

    .drawer-count {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: none;
    }

    .drawer-caret {
      transition: transform 0.35s ease;
      font-size: 11px;
      color: var(--text-muted);
    }

    .drawer.closed .drawer-caret {
      transform: rotate(180deg);
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .drawer-controls {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .drawer-field label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .drawer-controls .action-btn {
      flex: none;
      width: auto;
      min-width: 180px;
      padding: 11px 24px;
    }

    .drawer-content .matches-grid {
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="main-row">
      <aside class="sidebar sidebar-left">
        <div class="brand">
          <h1 class="brand-name">Bloomette</h1>
          <span class="brand-tagline">Color Mood Finder</span>
        </div>

        <div class="tool-group">
          <label for="colorPicker">Color</label>
          <input class="color-picker" type="color" id="colorPicker" value="#1A1A1A" />
          <div class="color-value"><span id="rgbValue">rgb(26, 26, 26)</span></div>
        </div>

        <div class="tool-group">
          <label for="brushSize">Brush</label>
          <input type="range" id="brushSize" min="1" max="50" value="8" />
          <div class="brush-size-value"><span id="brushSizeValue">8</span> px</div>
        </div>

        <div class="button-row">
          <button class="action-btn secondary" id="undoBtn" disabled>Undo</button>
          <button class="action-btn secondary" id="clearCanvas">Clear</button>
        </div>
      </aside>

      <main class="canvas-wrap">
        <canvas id="drawingCanvas" width="1100" height="700"></canvas>
      </main>

      <aside class="sidebar sidebar-right">
        <div class="panel-header">Analysis</div>

        <div class="tool-group">
          <div class="section-title">Average tone</div>
          <div class="lab-value"><span id="avgLabValue">L: 0.0, a: 0.0, b: 0.0</span></div>
        </div>

        <div class="tool-group">
          <div class="section-title">Tone breakdown</div>
          <div class="histogram-label">Lightness, warmth &amp; coolness</div>
          <div class="chart-wrap">
            <canvas id="labHistogramCanvas" class="mini-canvas" width="260" height="180"></canvas>
          </div>
        </div>

        <div class="tool-group">
          <div class="section-title">Palette</div>
          <div class="histogram-label">Most-used colors</div>
          <div class="chart-wrap">
            <canvas id="pieChartCanvas" class="mini-canvas" width="260" height="260"></canvas>
          </div>
          <div class="legend" id="pieLegend"></div>
        </div>
      </aside>
    </div>

    <section class="drawer closed" id="matchesDrawer">
      <button class="drawer-toggle" id="drawerToggle" aria-expanded="false">
        <span class="drawer-label-group">
          <span class="drawer-label">Matching Imagery</span>
          <span class="drawer-count" id="matchCount"></span>
        </span>
        <span class="drawer-caret" aria-hidden="true">↑</span>
      </button>

      <div class="drawer-content">
        <div class="drawer-controls">
          <div class="drawer-field">
            <label for="topNInput">Matches</label>
            <input type="number" id="topNInput" min="1" max="100" value="10" />
          </div>
          <div class="drawer-field">
            <label for="csvFileInput">Index CSV (optional)</label>
            <input type="file" id="csvFileInput" accept=".csv,text/csv" />
          </div>
          <button class="action-btn" id="findMatchesBtn">Find my bloom</button>
        </div>
        <div class="status-text" id="matchStatus">Ready when you are.</div>
        <div class="matches-grid" id="matchesGrid"></div>
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('colorPicker');
    const rgbValue = document.getElementById('rgbValue');
    const brushSizeInput = document.getElementById('brushSize');
    const brushSizeValue = document.getElementById('brushSizeValue');
    const clearCanvasBtn = document.getElementById('clearCanvas');
    const undoBtn = document.getElementById('undoBtn');
    const avgLabValue = document.getElementById('avgLabValue');
    const histogramCanvas = document.getElementById('labHistogramCanvas');
    const histogramCtx = histogramCanvas.getContext('2d');
    const pieCanvas = document.getElementById('pieChartCanvas');
    const pieCtx = pieCanvas.getContext('2d');
    const pieLegend = document.getElementById('pieLegend');
    const topNInput = document.getElementById('topNInput');
    const findMatchesBtn = document.getElementById('findMatchesBtn');
    const csvFileInput = document.getElementById('csvFileInput');
    const matchStatus = document.getElementById('matchStatus');
    const matchCount = document.getElementById('matchCount');
    const matchesGrid = document.getElementById('matchesGrid');

    const matchesDrawer = document.getElementById('matchesDrawer');
    const drawerToggle = document.getElementById('drawerToggle');

    let drawing = false;
    let currentColor = '#1A1A1A';
    let brushSize = Number(brushSizeInput.value);
    let strokeHistory = [];
    let currentStroke = null;
    let currentCanvasFeatures = null;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function hexToRgb(hex) {
      const cleanHex = hex.replace('#', '');
      const bigint = parseInt(cleanHex, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgb(${r}, ${g}, ${b})`;
    }

    function rgbStringFromObject(color) {
      return `rgb(${color.r}, ${color.g}, ${color.b})`;
    }

    function updateUndoButton() {
      undoBtn.disabled = strokeHistory.length === 0;
    }

    function getPointerPosition(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      let clientX;
      let clientY;

      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
      };
    }

    function drawStroke(stroke) {
      if (!stroke || stroke.points.length === 0) return;

      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.size;
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);

      if (stroke.points.length === 1) {
        ctx.lineTo(stroke.points[0].x + 0.01, stroke.points[0].y + 0.01);
      } else {
        for (let i = 1; i < stroke.points.length; i++) {
          ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
      }

      ctx.stroke();
    }

    function redrawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const stroke of strokeHistory) {
        drawStroke(stroke);
      }
      updateCanvasAnalysis();
    }

    function srgbToLinear(value) {
      const v = value / 255;
      return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    }

    function rgbToLab(r, g, b) {
      const rl = srgbToLinear(r);
      const gl = srgbToLinear(g);
      const bl = srgbToLinear(b);

      const x = (rl * 0.4124564 + gl * 0.3575761 + bl * 0.1804375) / 0.95047;
      const y = (rl * 0.2126729 + gl * 0.7151522 + bl * 0.0721750) / 1.00000;
      const z = (rl * 0.0193339 + gl * 0.1191920 + bl * 0.9503041) / 1.08883;

      const f = (t) => t > 0.008856 ? Math.cbrt(t) : (7.787 * t) + (16 / 116);
      const fx = f(x);
      const fy = f(y);
      const fz = f(z);

      return {
        l: (116 * fy) - 16,
        a: 500 * (fx - fy),
        b: 200 * (fy - fz)
      };
    }

    function clearMiniCanvas(context, width, height) {
      context.clearRect(0, 0, width, height);
      context.fillStyle = '#ffffff';
      context.fillRect(0, 0, width, height);
    }

    function drawEmptyHistogram() {
      clearMiniCanvas(histogramCtx, histogramCanvas.width, histogramCanvas.height);
      histogramCtx.fillStyle = '#666';
      histogramCtx.font = '13px Arial';
      histogramCtx.textAlign = 'center';
      histogramCtx.fillText('No colors yet — start drawing', histogramCanvas.width / 2, histogramCanvas.height / 2);
    }

    function drawHistogram(seriesList) {
      const width = histogramCanvas.width;
      const height = histogramCanvas.height;
      clearMiniCanvas(histogramCtx, width, height);

      const padding = 18;
      const chartWidth = width - padding * 2;
      const chartHeight = height - padding * 2;
      const bins = seriesList[0].values.length;
      const maxValue = Math.max(1, ...seriesList.flatMap(series => series.values));
      const groupWidth = chartWidth / bins;
      const barWidth = groupWidth / 4;

      histogramCtx.strokeStyle = '#bbb';
      histogramCtx.beginPath();
      histogramCtx.moveTo(padding, padding);
      histogramCtx.lineTo(padding, height - padding);
      histogramCtx.lineTo(width - padding, height - padding);
      histogramCtx.stroke();

      seriesList.forEach((series, seriesIndex) => {
        histogramCtx.fillStyle = series.color;
        series.values.forEach((value, i) => {
          const x = padding + i * groupWidth + barWidth * (seriesIndex + 0.5);
          const barHeight = (value / maxValue) * (chartHeight - 8);
          const y = height - padding - barHeight;
          histogramCtx.fillRect(x, y, barWidth, barHeight);
        });
      });

      histogramCtx.font = '10px Arial';
      histogramCtx.textAlign = 'center';
      histogramCtx.fillStyle = '#444';
      for (let i = 0; i < bins; i++) {
        const x = padding + i * groupWidth + groupWidth / 2;
        histogramCtx.fillText(String(i + 1), x, height - 4);
      }

      const legendY = 12;
      const legendItems = [
        { text: 'L', color: '#555555', x: 35 },
        { text: 'a', color: '#c05050', x: 85 },
        { text: 'b', color: '#5080c0', x: 135 }
      ];

      legendItems.forEach(item => {
        histogramCtx.fillStyle = item.color;
        histogramCtx.fillRect(item.x, legendY - 8, 10, 10);
        histogramCtx.fillStyle = '#333';
        histogramCtx.textAlign = 'left';
        histogramCtx.fillText(item.text, item.x + 14, legendY);
      });
    }

    function drawEmptyPieChart() {
      clearMiniCanvas(pieCtx, pieCanvas.width, pieCanvas.height);
      pieCtx.fillStyle = '#666';
      pieCtx.font = '13px Arial';
      pieCtx.textAlign = 'center';
      pieCtx.fillText('No colors yet — start drawing', pieCanvas.width / 2, pieCanvas.height / 2);
      pieLegend.innerHTML = '';
    }

    function drawPieChart(colorEntries) {
      clearMiniCanvas(pieCtx, pieCanvas.width, pieCanvas.height);
      pieLegend.innerHTML = '';

      const total = colorEntries.reduce((sum, entry) => sum + entry.count, 0);
      const centerX = pieCanvas.width / 2;
      const centerY = pieCanvas.height / 2;
      const radius = 90;
      let startAngle = -Math.PI / 2;

      colorEntries.forEach(entry => {
        const sliceAngle = (entry.count / total) * Math.PI * 2;
        pieCtx.beginPath();
        pieCtx.moveTo(centerX, centerY);
        pieCtx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
        pieCtx.closePath();
        pieCtx.fillStyle = entry.color;
        pieCtx.fill();
        pieCtx.strokeStyle = '#fff';
        pieCtx.lineWidth = 1;
        pieCtx.stroke();
        startAngle += sliceAngle;

        const percent = ((entry.count / total) * 100).toFixed(1);
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <span class="legend-swatch" style="background:${entry.color}"></span>
          <span>${entry.color} — ${percent}%</span>
        `;
        pieLegend.appendChild(item);
      });
    }

    function quantizeColor(r, g, b, step = 32) {
      const qr = Math.min(255, Math.round(r / step) * step);
      const qg = Math.min(255, Math.round(g / step) * step);
      const qb = Math.min(255, Math.round(b / step) * step);
      return { r: qr, g: qg, b: qb, key: `${qr},${qg},${qb}` };
    }

    function normalizeArray(values) {
      const total = values.reduce((sum, value) => sum + value, 0);
      if (total === 0) return values.map(() => 0);
      return values.map(value => value / total);
    }

    function updateCanvasAnalysis() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let totalL = 0;
      let totalA = 0;
      let totalB = 0;
      let count = 0;

      const lBins = new Array(8).fill(0);
      const aBins = new Array(8).fill(0);
      const bBins = new Array(8).fill(0);
      const colorCounts = new Map();

      for (let i = 0; i < imageData.length; i += 4) {
        const r = imageData[i];
        const g = imageData[i + 1];
        const b = imageData[i + 2];
        const alpha = imageData[i + 3];

        const isTransparent = alpha === 0;
        const isWhite = r === 255 && g === 255 && b === 255;

        if (isTransparent || isWhite) continue;

        const lab = rgbToLab(r, g, b);
        totalL += lab.l;
        totalA += lab.a;
        totalB += lab.b;
        count += 1;

        const lIndex = Math.min(7, Math.max(0, Math.floor((lab.l / 100) * 8)));
        const aIndex = Math.min(7, Math.max(0, Math.floor(((lab.a + 128) / 255) * 8)));
        const bIndex = Math.min(7, Math.max(0, Math.floor(((lab.b + 128) / 255) * 8)));
        lBins[lIndex] += 1;
        aBins[aIndex] += 1;
        bBins[bIndex] += 1;

        const quantized = quantizeColor(r, g, b, 32);
        const colorKey = quantized.key;
        if (!colorCounts.has(colorKey)) {
          colorCounts.set(colorKey, { color: rgbStringFromObject(quantized), count: 0 });
        }
        colorCounts.get(colorKey).count += 1;
      }

      if (count === 0) {
        avgLabValue.textContent = 'L: 0.0, a: 0.0, b: 0.0';
        currentCanvasFeatures = null;
        drawEmptyHistogram();
        drawEmptyPieChart();
        return;
      }

      const avgL = totalL / count;
      const avgA = totalA / count;
      const avgBValue = totalB / count;
      avgLabValue.textContent = `L: ${avgL.toFixed(1)}, a: ${avgA.toFixed(1)}, b: ${avgBValue.toFixed(1)}`;

      drawHistogram([
        { values: lBins, color: '#555555' },
        { values: aBins, color: '#c05050' },
        { values: bBins, color: '#5080c0' }
      ]);

      const topColors = Array.from(colorCounts.values())
        .sort((first, second) => second.count - first.count)
        .slice(0, 6);
      drawPieChart(topColors);

      currentCanvasFeatures = {
        avgLab: [avgL, avgA, avgBValue],
        histL: normalizeArray(lBins),
        histA: normalizeArray(aBins),
        histB: normalizeArray(bBins),
        usedPixels: count
      };
    }

    function euclideanDistance(first, second) {
      let sum = 0;
      for (let i = 0; i < first.length; i++) {
        const diff = first[i] - second[i];
        sum += diff * diff;
      }
      return Math.sqrt(sum);
    }

    function histogramDistance(queryFeatures, imageFeatures) {
      return (
        euclideanDistance(queryFeatures.histL, imageFeatures.histL) +
        euclideanDistance(queryFeatures.histA, imageFeatures.histA) +
        euclideanDistance(queryFeatures.histB, imageFeatures.histB)
      );
    }

    function matchingScore(queryFeatures, imageFeatures) {
      const avgLabDistance = euclideanDistance(queryFeatures.avgLab, imageFeatures.avgLab);
      const histDistance = histogramDistance(queryFeatures, imageFeatures);
      return 0.25 * avgLabDistance + 0.75 * histDistance;
    }

    function parseHistogramField(value) {
      return value.split('|').map(Number);
    }

    function splitCsvLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];

      const headers = splitCsvLine(lines[0]);
      return lines.slice(1).map(line => {
        const cells = splitCsvLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = cells[index] ?? '';
        });
        return row;
      });
    }

    function csvRowToFeatures(row) {
      return {
        fileName: row.file_name,
        filePath: row.file_path,
        avgLab: [Number(row.avg_lab_l), Number(row.avg_lab_a), Number(row.avg_lab_b)],
        histL: parseHistogramField(row.hist_l),
        histA: parseHistogramField(row.hist_a),
        histB: parseHistogramField(row.hist_b),
        usedPixels: Number(row.used_pixels || 0)
      };
    }

    function renderMatches(matches) {
      matchesGrid.innerHTML = '';
      if (matches.length === 0) {
        matchCount.textContent = 'No matching imagery found.';
        return;
      }

      matchCount.textContent = `Showing ${matches.length} matching image(s).`;

      for (const match of matches) {
        const card = document.createElement('div');
        card.className = 'match-card';

        const link = document.createElement('a');
        link.href = match.fileName;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.title = 'Open image in a new tab';

        const image = document.createElement('img');
        image.src = match.fileName;
        image.alt = 'Matching image';
        image.loading = 'lazy';
        image.onerror = () => {
          image.alt = 'Could not load image';
          image.style.display = 'none';
        };

        const score = document.createElement('div');
        score.className = 'match-score';
        score.textContent = `Score: ${match.score.toFixed(4)}`;

        link.appendChild(image);
        card.appendChild(link);
        card.appendChild(score);
        matchesGrid.appendChild(card);
      }
    }

    async function readSelectedCsvFile(file) {
      return await file.text();
    }

    async function loadCsvText() {
      if (csvFileInput.files && csvFileInput.files[0]) {
        matchStatus.textContent = 'Reading the selected CSV file...';
        return await readSelectedCsvFile(csvFileInput.files[0]);
      }

      const response = await fetch('./image_index.csv', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Could not load image_index.csv (HTTP ${response.status})`);
      }
      return await response.text();
    }

    async function findMatches() {
      if (!currentCanvasFeatures) {
        matchStatus.textContent = 'Draw something first to find your bloom.';
        matchCount.textContent = '';
        matchesGrid.innerHTML = '';
        return;
      }

      const requestedCount = Math.max(1, Math.floor(Number(topNInput.value) || 1));
      matchStatus.textContent = 'Loading imagery and matching colors…';
      matchCount.textContent = '';
      matchesGrid.innerHTML = '';

      try {
        const csvText = await loadCsvText();
        const rows = parseCsv(csvText);
        const imageFeatures = rows.map(csvRowToFeatures).filter(row => row.usedPixels > 0);

        const rankedMatches = imageFeatures
          .map(features => ({
            ...features,
            score: matchingScore(currentCanvasFeatures, features)
          }))
          .sort((first, second) => first.score - second.score)
          .slice(0, requestedCount);

        renderMatches(rankedMatches);
        matchStatus.textContent = csvFileInput.files && csvFileInput.files[0]
          ? 'Found your bloom from the selected CSV file.'
          : 'Found your bloom.';
      } catch (error) {
        matchStatus.textContent = 'Could not load image_index.csv automatically. Either run a local web server from this folder or use the CSV file picker above.';
        matchCount.textContent = '';
        matchesGrid.innerHTML = '';
        console.error(error);
      }
    }

    function startDrawing(e) {
      const pos = getPointerPosition(e);
      drawing = true;
      currentStroke = {
        color: currentColor,
        size: brushSize,
        points: [pos],
      };
      drawStroke(currentStroke);
      updateCanvasAnalysis();
      e.preventDefault();
    }

    function draw(e) {
      if (!drawing || !currentStroke) return;
      const pos = getPointerPosition(e);
      currentStroke.points.push(pos);
      redrawCanvas();
      drawStroke(currentStroke);
      updateCanvasAnalysis();
      e.preventDefault();
    }

    function stopDrawing() {
      if (!drawing || !currentStroke) return;
      drawing = false;
      strokeHistory.push(currentStroke);
      currentStroke = null;
      updateUndoButton();
      updateCanvasAnalysis();
    }

    colorPicker.addEventListener('input', () => {
      currentColor = colorPicker.value;
      rgbValue.textContent = hexToRgb(currentColor);
    });

    brushSizeInput.addEventListener('input', () => {
      brushSize = Number(brushSizeInput.value);
      brushSizeValue.textContent = brushSize;
    });

    undoBtn.addEventListener('click', () => {
      if (strokeHistory.length === 0) return;
      strokeHistory.pop();
      redrawCanvas();
      updateUndoButton();
    });

    clearCanvasBtn.addEventListener('click', () => {
      strokeHistory = [];
      currentStroke = null;
      drawing = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updateUndoButton();
      updateCanvasAnalysis();
      matchStatus.textContent = 'Ready when you are.';
      matchCount.textContent = '';
      matchesGrid.innerHTML = '';
    });

    findMatchesBtn.addEventListener('click', findMatches);

    drawerToggle.addEventListener('click', () => {
      const nowOpen = matchesDrawer.classList.toggle('closed');
      drawerToggle.setAttribute('aria-expanded', nowOpen ? 'false' : 'true');
    });

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    window.addEventListener('touchend', stopDrawing, { passive: false });
    canvas.addEventListener('touchcancel', stopDrawing, { passive: false });

    rgbValue.textContent = hexToRgb(currentColor);
    updateUndoButton();
    updateCanvasAnalysis();
  </script>
</body>
</html>
